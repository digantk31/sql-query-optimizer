name: sql-query-optimizer
version: "1.0.0"
description: "An RL environment where AI agents learn to rewrite slow SQL queries for correctness, performance, and style against a live SQLite e-commerce database."

tags:
  - sql
  - database
  - optimization
  - real-world
  - code-improvement

observation_space:
  type: object
  properties:
    task_id:
      type: string
    task_name:
      type: string
    difficulty:
      type: string
    description:
      type: string
    schema_ddl:
      type: string
    slow_query:
      type: string
    current_query:
      type: string
    step_number:
      type: integer
    max_steps:
      type: integer
    last_feedback:
      type: string
    last_reward:
      type: number

action_space:
  type: object
  properties:
    optimized_query:
      type: string

reward_range:
  - 0.0
  - 1.0

tasks:
  - id: select_star_removal
    name: "SELECT * Elimination"
    difficulty: easy
    max_steps: 5
    description: "Rewrite SELECT * to return only required columns (user_id, username, email) for all active users."

  - id: subquery_to_join
    name: "Correlated Subquery to JOIN"
    difficulty: medium
    max_steps: 6
    description: "Convert an IN (SELECT ...) subquery to an explicit JOIN returning delivered orders from active USA customers."

  - id: aggregation_optimization
    name: "Aggregation Optimization"
    difficulty: hard
    max_steps: 8
    description: "Replace correlated subqueries in the SELECT list with JOIN and GROUP BY to compute per-category revenue efficiently."
